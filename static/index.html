<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Document Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100dvh; display: flex; }

  /* ── Auth screen ── */
  #auth-screen { position: fixed; inset: 0; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
  #auth-screen.hidden { display: none; }
  .auth-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 32px; width: 360px; }
  .auth-card h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .auth-card h2 span { color: #7c6af7; }
  .auth-card p { font-size: 13px; color: #555; margin-bottom: 24px; }
  .auth-card input { display: block; width: 100%; padding: 10px 12px; margin-bottom: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #e8e8e8; font-size: 14px; }
  .auth-card input::placeholder { color: #555; }
  .auth-card input:focus { outline: none; border-color: #7c6af7; }
  .auth-card .btn-primary { display: block; width: 100%; padding: 10px; background: #7c6af7; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .auth-card .btn-primary:hover { background: #6b5ae0; }
  .auth-card .switch { margin-top: 16px; text-align: center; font-size: 13px; color: #555; }
  .auth-card .switch a { color: #7c6af7; cursor: pointer; text-decoration: none; }
  .auth-card .switch a:hover { text-decoration: underline; }
  .auth-error { color: #f87171; font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* ── App layout ── */
  #app { display: flex; width: 100%; height: 100%; }
  #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  #sidebar-header h1 { font-size: 14px; font-weight: 600; color: #fff; }
  #sidebar-header h1 span { color: #7c6af7; }
  #user-bar { display: flex; align-items: center; gap: 8px; }
  #user-name { font-size: 12px; color: #7c6af7; font-weight: 500; }
  #logout-btn { background: none; border: 1px solid #333; border-radius: 6px; color: #888; font-size: 11px; padding: 3px 8px; cursor: pointer; }
  #logout-btn:hover { border-color: #f87171; color: #f87171; }

  #docs-panel { flex: 1; overflow-y: auto; padding: 10px; }
  #docs-panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #555; margin-bottom: 8px; }
  .doc-item { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 6px; background: #222; margin-bottom: 4px; }
  .doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ccc; font-size: 12px; }
  .doc-item .doc-del { background: none; border: none; color: #555; cursor: pointer; font-size: 13px; line-height: 1; }
  .doc-item .doc-del:hover { color: #f87171; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-ready { background: #4ade80; }
  .dot-processing { background: #facc15; }
  .dot-error { background: #f87171; }

  #upload-area { padding: 10px; border-top: 1px solid #2a2a2a; }
  #upload-label { display: block; padding: 8px; border: 1px dashed #333; border-radius: 6px; text-align: center; font-size: 12px; color: #555; cursor: pointer; transition: all .15s; }
  #upload-label:hover { border-color: #7c6af7; color: #7c6af7; }
  #file-input { display: none; }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #sessions-bar { padding: 8px 16px; border-bottom: 1px solid #2a2a2a; display: flex; gap: 6px; align-items: center; overflow-x: auto; }
  #sessions-bar button { padding: 4px 10px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #888; font-size: 12px; cursor: pointer; white-space: nowrap; }
  #new-session-btn { border-style: dashed !important; color: #555 !important; background: none !important; }
  #new-session-btn:hover { border-color: #7c6af7 !important; color: #7c6af7 !important; }
  .session-tab { display: inline-flex; align-items: center; gap: 4px; padding: 4px 6px 4px 10px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; font-size: 12px; white-space: nowrap; }
  .session-tab.active { border-color: #7c6af7; background: #1e1640; }
  .session-tab span { color: #888; cursor: pointer; }
  .session-tab.active span { color: #c4b5fd; }
  .session-tab .del-btn { color: #444; background: none; border: none; cursor: pointer; font-size: 12px; line-height: 1; padding: 0 2px; }
  .session-tab .del-btn:hover { color: #f87171; }

  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 720px; }
  .msg-user { align-self: flex-end; background: #7c6af7; padding: 10px 14px; border-radius: 12px 12px 3px 12px; font-size: 14px; }
  .msg-assistant { align-self: flex-start; max-width: 80%; }
  .msg-assistant .bubble { background: #1e1e1e; border: 1px solid #2a2a2a; padding: 12px 14px; border-radius: 3px 12px 12px 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .source-chip { padding: 3px 8px; border-radius: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; font-size: 11px; color: #777; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; gap: 8px; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; color: #2a2a2a; }

  #input-bar { padding: 12px 16px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; }
  #question-input { flex: 1; padding: 10px 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 14px; resize: none; height: 44px; }
  #question-input:focus { outline: none; border-color: #7c6af7; }
  #question-input:disabled { opacity: .3; cursor: not-allowed; }
  #send-btn { padding: 0 18px; background: #7c6af7; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 18px; }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }

  .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 999; }
  .toast-err { background: #3a1a1a; border: 1px solid #5a2a2a; color: #f87171; }
  .toast-ok  { background: #1a3a1a; border: 1px solid #2a5a2a; color: #4ade80; }
</style>
</head>
<body>

<!-- Auth screen (shown when logged out) -->
<div id="auth-screen">
  <div class="auth-card">
    <!-- Register view -->
    <div id="view-register">
      <h2>RAG <span>Assistant</span></h2>
      <p>Create an account to get started</p>
      <input id="reg-email" type="email" placeholder="Email" onkeydown="if(event.key==='Enter') register()">
      <input id="reg-user"  type="text"  placeholder="Username" onkeydown="if(event.key==='Enter') register()">
      <input id="reg-pass"  type="password" placeholder="Password (min 8 chars)" onkeydown="if(event.key==='Enter') register()">
      <button class="btn-primary" onclick="register()">Create account</button>
      <div class="auth-error" id="reg-err"></div>
      <div class="switch">Already have an account? <a onclick="showLogin()">Sign in</a></div>
    </div>
    <!-- Login view -->
    <div id="view-login" style="display:none">
      <h2>Welcome <span>back</span></h2>
      <p>Sign in with your email and password</p>
      <input id="login-email" type="email"    placeholder="Email" onkeydown="if(event.key==='Enter') login()">
      <input id="login-pass"  type="password" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
      <button class="btn-primary" onclick="login()">Sign in</button>
      <div class="auth-error" id="login-err"></div>
      <div class="switch">Don't have an account? <a onclick="showRegister()">Register</a></div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>RAG <span>Assistant</span></h1>
      <div id="user-bar">
        <span id="user-name"></span>
        <button id="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div id="docs-panel">
      <h2>Documents</h2>
      <div id="doc-list"></div>
    </div>
    <div id="upload-area">
      <label id="upload-label" for="file-input">+ Upload PDF</label>
      <input id="file-input" type="file" accept=".pdf" onchange="uploadPdf(this)">
    </div>
  </div>

  <div id="main">
    <div id="sessions-bar">
      <button id="new-session-btn" onclick="newSession()">+ New chat</button>
    </div>
    <div id="messages">
      <div class="empty-state">
        <p>Upload a PDF, then ask anything.</p>
        <small>Answers stream in real-time with source references.</small>
      </div>
    </div>
    <div id="input-bar">
      <textarea id="question-input" placeholder="Ask a question… (Enter to send)" onkeydown="handleKey(event)" disabled></textarea>
      <button id="send-btn" onclick="send()" disabled>&#10148;</button>
    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('token') || '';
let currentSession = null;
let sessionNames = {};

// ── Auth screen ───────────────────────────────────────────────────────────────

function showLogin()    { document.getElementById('view-register').style.display = 'none'; document.getElementById('view-login').style.display = ''; }
function showRegister() { document.getElementById('view-login').style.display = 'none'; document.getElementById('view-register').style.display = ''; }

function setAuthErr(id, msg) { document.getElementById(id).textContent = msg; }

async function register() {
  setAuthErr('reg-err', '');
  try {
    const d = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({
      email: val('reg-email'), username: val('reg-user'), password: val('reg-pass')
    })});
    onLogin(d);
  } catch(e) { setAuthErr('reg-err', e.message); }
}

async function login() {
  setAuthErr('login-err', '');
  try {
    const d = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({
      email: val('login-email'), password: val('login-pass')
    })});
    onLogin(d);
  } catch(e) { setAuthErr('login-err', e.message); }
}

function onLogin(d) {
  token = d.access_token;
  localStorage.setItem('token', token);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('user-name').textContent = d.username;
  document.getElementById('question-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  loadDocs();
  loadSessions();
}

function logout() {
  token = ''; localStorage.removeItem('token');
  currentSession = null; sessionNames = {};
  document.getElementById('question-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('doc-list').innerHTML = '';
  document.getElementById('sessions-bar').innerHTML = '<button id="new-session-btn" onclick="newSession()">+ New chat</button>';
  document.getElementById('messages').innerHTML = emptyHtml();
  document.getElementById('auth-screen').classList.remove('hidden');
  showRegister();
}

// ── API helper ────────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...(opts.headers || {}) };
  const r = await fetch(API + path, { ...opts, headers });
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    // FastAPI validation errors return detail as an array of {msg, loc} objects
    const detail = Array.isArray(e.detail)
      ? e.detail.map(d => d.msg || JSON.stringify(d)).join(', ')
      : (e.detail || r.statusText);
    throw new Error(detail);
  }
  return r.status === 204 ? null : r.json();
}

// ── Documents ─────────────────────────────────────────────────────────────────

async function loadDocs() {
  try {
    const docs = await apiFetch('/documents/');
    const el = document.getElementById('doc-list');
    el.innerHTML = docs.length ? docs.map(d => `
      <div class="doc-item">
        <div class="dot dot-${d.status}"></div>
        <span class="doc-name" title="${d.original_name}">${d.original_name}</span>
        <button class="doc-del" onclick="deleteDoc('${d.id}')">x</button>
      </div>`).join('') : '<p style="font-size:12px;color:#444;padding:4px">No documents yet</p>';
  } catch {}
}

async function uploadPdf(input) {
  const file = input.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try {
    await fetch(API + '/documents/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    toast('Uploaded: ' + file.name, 'ok'); loadDocs();
  } catch(e) { toast('Upload failed', 'err'); }
  input.value = '';
}

async function deleteDoc(id) {
  try { await apiFetch('/documents/' + id, { method: 'DELETE' }); loadDocs(); }
  catch(e) { toast(e.message, 'err'); }
}

// ── Sessions ──────────────────────────────────────────────────────────────────

async function loadSessions() {
  try {
    const list = await apiFetch('/chat/sessions');
    sessionNames = {};
    list.forEach((s, i) => { sessionNames[s.id] = 'Chat ' + (list.length - i); });
    renderSessionBar();
    if (list.length) switchSession(list[0].id);
  } catch {}
}

function renderSessionBar() {
  const bar = document.getElementById('sessions-bar');
  bar.innerHTML = '<button id="new-session-btn" onclick="newSession()">+ New chat</button>';
  Object.entries(sessionNames).forEach(([id, name]) => {
    const tab = document.createElement('div');
    tab.className = 'session-tab' + (id === currentSession ? ' active' : '');
    tab.innerHTML = `<span>${name}</span><button class="del-btn" title="Delete">x</button>`;
    tab.querySelector('span').onclick = () => switchSession(id);
    tab.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteSession(id); };
    bar.appendChild(tab);
  });
}

async function switchSession(id) {
  currentSession = id; renderSessionBar();
  try {
    const s = await apiFetch('/chat/sessions/' + id);
    const el = document.getElementById('messages');
    el.innerHTML = '';
    s.messages.forEach(m => {
      if (m.role === 'user') appendMsg(m.content, 'user');
      else appendMsg(m.content, 'assistant', m.sources || []);
    });
    el.scrollTop = el.scrollHeight;
  } catch {}
}

function newSession() {
  currentSession = null; renderSessionBar();
  document.getElementById('messages').innerHTML = emptyHtml();
}

async function deleteSession(id) {
  try {
    await apiFetch('/chat/sessions/' + id, { method: 'DELETE' });
    delete sessionNames[id];
    if (currentSession === id) {
      currentSession = null;
      document.getElementById('messages').innerHTML = emptyHtml();
    }
    renderSessionBar();
  } catch(e) { toast(e.message, 'err'); }
}

// ── Chat ──────────────────────────────────────────────────────────────────────

async function send() {
  const q = document.getElementById('question-input').value.trim();
  if (!q) return;
  document.getElementById('question-input').value = '';
  document.getElementById('send-btn').disabled = true;

  const el = document.getElementById('messages');
  if (el.querySelector('.empty-state')) el.innerHTML = '';
  appendMsg(q, 'user');
  const msgDiv = appendMsg('', 'assistant');
  let fullText = '';

  try {
    const r = await fetch(API + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ question: q, session_id: currentSession }),
    });
    if (!r.ok) throw new Error((await r.json()).detail);

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const ev = JSON.parse(line.slice(6));
        if (ev.type === 'sources') {
          renderSources(msgDiv, ev.sources);
          if (!currentSession && ev.session_id) {
            currentSession = ev.session_id;
            sessionNames[currentSession] = 'Chat ' + (Object.keys(sessionNames).length + 1);
            renderSessionBar();
          }
        } else if (ev.type === 'token') {
          fullText += ev.text;
          msgDiv.querySelector('.bubble').textContent = fullText;
          el.scrollTop = el.scrollHeight;
        } else if (ev.type === 'error') {
          throw new Error(ev.detail);
        }
      }
    }
  } catch(e) {
    toast(e.message, 'err');
    msgDiv.querySelector('.bubble').textContent = 'Error: ' + e.message;
  }
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function appendMsg(text, role, sources = []) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  if (role === 'user') {
    div.textContent = text;
  } else {
    div.innerHTML = '<div class="bubble"></div><div class="sources"></div>';
    div.querySelector('.bubble').textContent = text;
    if (sources.length) renderSources(div, sources);
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

function renderSources(div, sources) {
  div.querySelector('.sources').innerHTML = sources.map(s =>
    `<span class="source-chip">doc: ${s.document_name} p.${s.page} (${(s.score * 100).toFixed(0)}%)</span>`
  ).join('');
}

function val(id) { return document.getElementById(id).value.trim(); }

function emptyHtml() {
  return '<div class="empty-state"><p>Upload a PDF, then ask anything.</p><small>Answers stream in real-time with source references.</small></div>';
}

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

if (token) {
  apiFetch('/auth/me')
    .then(u => onLogin({ access_token: token, username: u.username }))
    .catch(() => { token = ''; localStorage.removeItem('token'); });
}
</script>
</body>
</html>
